name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint · types · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Mypy (strict)
        run: mypy src/threatlens
      - name: Golden regression (reasoning · IOC validation · detection freeze · knowledge library · exposure freeze · correlation)
        run: pytest tests/benchmark tests/validation tests/detection tests/detection_library tests/exposure_validation tests/correlation
      - name: Pytest (full suite)
        run: pytest

  frontend:
    name: Frontend (build · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (type-checks)
        run: npm run build
      - name: Test
        run: npm test
